version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
        - npx prisma generate
    build:
      commands:
        - env | grep -E '^(DATABASE_URL|AUTH_|MONGODB_URI|OPENAI_|RAPIDAPI_|RERA_|GOOGLE_|NEWS_|RENTAL_|CLOUDINARY_)' >> .env.production || true
        - npx prisma db push
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
